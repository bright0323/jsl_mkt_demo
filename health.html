<!doctype html>
<html lang="zh-Hant">

    <title>星河帝寶｜健康主題</title>
    <meta name="theme-color" content="#060b12" />
    <style>
      :root { background: #060b12; }
      html, body { margin: 0; min-height: 100%; background: #060b12; color: #f5efe2; }
      .stage { background: #060b12; }
    </style>
    <link rel="stylesheet" href="styles.css?v=20260530-frame" />
    <link rel="stylesheet" href="safety.css?v=20260601-framework" />
  </head>
  <body style="background: #060b12; color: #f5efe2">
    <main class="stage safety-stage" style="background: #060b12" aria-label="星河帝寶健康主題">
      <div class="hero-bg" aria-hidden="true"></div>
      <div class="safety-shade" aria-hidden="true"></div>
      <div class="safety-particles" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="safety-grid" aria-hidden="true"></div>

      <section class="safety-workbench" aria-label="健康主題內容">
        <div class="detail-bar">
          <nav class="item-tabs" aria-label="健康主題項目">
            <button class="item-tab is-active" type="button" data-item="overview">健康總覽</button>
          </nav>
        </div>

        <article class="smart-item overview-panel is-active" data-panel="overview">
          <div class="item-copy overview-copy">
            <h2>健康</h2>
            <h3>看不見的安全，也有人替您把關</h3>
            <p>家，是最讓人卸下防備的地方。從 Apple、Tesla、Microsoft 到 Sony，世界級科技品牌共同重視的，是能被國際市場信任的安全標準。UL Solutions 源自 1894 年，是全球安全科學領域的重要權威。甲山林攜手 UL Solutions，將國際級健康建築與建築生產履歷標準導入住宅，透過完整檢測紀錄與文件審查，讓建築品質不只靠口頭承諾，而是有標準、有紀錄、有依據。讓看不見的細節也能被清楚追溯，為您打造更安心的宜居生活。</p>
          </div>
          <div class="demo-area">
            <button class="feature-video" type="button" data-open-video="能源效率.mp4" aria-label="播放健康總覽影片">
              <video src="能源效率.mp4" muted playsinline preload="metadata"></video>
              <span class="play-mark" aria-hidden="true"></span>
              <span class="video-label">健康總覽影片</span>
            </button>
          </div>
        </article>
      </section>

      <a class="back-home" href="index.html" aria-label="返回首頁">返回</a>
      <div class="video-modal" aria-hidden="true"><button class="modal-close" type="button" aria-label="關閉影片">×</button><video controls playsinline></video></div>
      <div class="info-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="info-title"><div class="info-dialog"><button class="info-close" type="button" aria-label="關閉補充說明">×</button><h2 id="info-title"></h2><p class="info-copy"></p></div></div>
    </main>
    <script src="safety.js"></script>
